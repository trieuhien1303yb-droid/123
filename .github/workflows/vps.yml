name: GitHub Actions VPS via ngrok

on: 
  workflow_dispatch: # Cho phép bạn nhấn nút "Run" thủ công trên web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Cập nhật hệ thống và cài đặt OpenSSH
      run: |
        sudo apt update
        sudo apt install -y openssh-server
        sudo mkdir /var/run/sshd
        echo "runneradmin:${{ secrets.SSH_PASSWORD }}" | sudo chpasswd
        echo "PermitRootLogin yes" | sudo tee -a /etc/ssh/sshd_config
        sudo service ssh start

    - name: Tải và cài đặt ngrok
      run: |
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
        echo "deb https://ngrok-agent.s3.amazonaws.com/ buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt update && sudo apt install ngrok

    - name: Cấu hình Authtoken cho ngrok
      run: |
        ngrok config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}

    - name: Kích hoạt Tunnel và xuất địa chỉ kết nối
      run: |
        # Chạy ngrok ngầm ở cổng 22 (SSH), chọn region Asia (ap) để giảm ping
        ngrok tcp --region ap 22 &
        sleep 5 # Đợi 5 giây để ngrok khởi tạo đường truyền
        
        # Lấy địa chỉ IP công khai từ API nội bộ của ngrok và hiển thị ra màn hình log
        curl --silent http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url'
        
        # Giữ cho máy ảo không bị tắt ngay lập tức (Chạy liên tục trong 6 tiếng tối đa của GitHub Actions)
        sleep 21600
